services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autoops
      POSTGRES_PASSWORD: autoops
      POSTGRES_DB: autoops_demo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoops -d autoops_demo"]
      interval: 5s
      timeout: 5s
      retries: 5

  demo-app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://autoops:autoops@postgres:5432/autoops_demo
      N1_SLEEP_MS: "40"
      TIMEOUT_ERROR_RATE: "0.12"
      SPLUNK_HEC_URL: http://host.docker.internal:8088/services/collector/event
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN:-00000000-0000-0000-0000-000000000000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
